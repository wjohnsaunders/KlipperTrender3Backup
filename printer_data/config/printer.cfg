# This file contains configuration for a Voron Trident 170 running on a
# Fysetc Spider V3.0 H7, and it uses a Mellow Fly SHT36 Eddy V3
# for the toolhead PCB running over CAN. A/B stepper drivers and TMC2240
# SPI, # and other stepper drivers are TMC2209 UART.

# A Creality V4.2.2 board is used for Happy Hare filament changing.

# See docs/Config_Reference.md for a description of parameters.

#[include mmu/base/*.cfg]
#[include mmu/optional/client_macros.cfg]
#[include mmu/optional/mmu_menu.cfg]

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True
variable_custom_park_x    : 85.0
variable_custom_park_y    : 0.0
variable_custom_park_dz   : 10.0
variable_park_at_cancel   : True
gcode:

[include mainsail.cfg]

[mcu]
canbus_uuid: 5fa18a5c2751

[temperature_sensor spider_temp]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor pi_temp]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[include mcu_sht36_v3.cfg]

#[include mcu_creality_v4.2.2.cfg]

[virtual_sdcard]
path: /home/klipper/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[exclude_object]

[force_move]
enable_force_move: True

[respond]

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 7500
max_z_velocity: 25
max_z_accel: 350
square_corner_velocity: 5.0

[resonance_tester]
probe_points: 85, 90, 40

[input_shaper]
shaper_type_X: mzv
shaper_freq_x: 70.6
shaper_type_Y: mzv
shaper_freq_y: 50.4

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
timeout: 600
measurements_chunk_size: 4
max_freq: 200
dpi: 300

[stepper_x]
enable_pin: !M0_EN_PIN
step_pin: M0_STEP_PIN
dir_pin: !M0_DIR_PIN
microsteps: 32
rotation_distance: 40
# endstop_pin: configuration in sht36_v3.cfg
position_min: 0
position_max: 170
position_endstop: 170
homing_speed: 50

[tmc2240 stepper_x]
cs_pin: M0_CS_PIN
spi_software_sclk_pin: TMC_SCLK_PIN
spi_software_miso_pin: TMC_MISO_PIN
spi_software_mosi_pin: TMC_MOSI_PIN
interpolate: True
run_current: 0.8

[autotune_tmc stepper_x]
motor: usongshine-17hs4401S

[stepper_y]
enable_pin: !M1_EN_PIN
step_pin: M1_STEP_PIN
dir_pin: !M1_DIR_PIN
microsteps: 32
rotation_distance: 40
endstop_pin: ^Y_MIN_ENDSTOP_PIN
position_min: 0
position_max: 180
position_endstop: 180
homing_speed: 50

[tmc2240 stepper_y]
cs_pin: M1_CS_PIN
spi_software_sclk_pin: TMC_SCLK_PIN
spi_software_miso_pin: TMC_MISO_PIN
spi_software_mosi_pin: TMC_MOSI_PIN
interpolate: True
run_current: 0.8

[autotune_tmc stepper_y]
motor: usongshine-17hs4401S

[stepper_z]
enable_pin: !M2_EN_PIN
step_pin: M2_STEP_PIN
dir_pin: M2_DIR_PIN
microsteps: 32
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -10.0
position_max: 170

[tmc2209 stepper_z]
uart_pin: M2_UART_PIN
interpolate: True
run_current: 0.5

[autotune_tmc stepper_z]
motor: creality-42-34

[stepper_z1]
enable_pin: !M3_EN_PIN
step_pin: M3_STEP_PIN
dir_pin: M3_DIR_PIN
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: M3_UART_PIN
interpolate: True
run_current: 0.5

[autotune_tmc stepper_z1]
motor: creality-42-34

[stepper_z2]
enable_pin: !M4_EN_PIN
step_pin: M4_STEP_PIN
dir_pin: M4_DIR_PIN
microsteps: 32
rotation_distance: 8

[tmc2209 stepper_z2]
uart_pin: M4_UART_PIN
interpolate: True
run_current: 0.5

[autotune_tmc stepper_z2]
motor: creality-42-34

[extruder]
#enable_pin: configuration in sht36_v3.cfg
#step_pin: configuration in sht36_v3.cfg
#dir_pin: configuration in sht36_v3.cfg
microsteps: 32
gear_ratio: 50:10
rotation_distance: 22.7868
max_extrude_only_distance: 200.0
max_extrude_cross_section: 4.0
nozzle_diameter: 0.400
filament_diameter: 1.750
pressure_advance: 0.03
#heater_pin: configuration in sht36_v3.cfg
#sensor_pin: configuration in sht36_v3.cfg
sensor_type: ATC Semitec 104GT-2
pullup_resistor: 4700
min_temp: 10
max_temp: 310
min_extrude_temp: 20
control: pid
# Tuned for Triangle-Lab CHC TD6S hotend at 250C target
pid_Kp: 25.958
pid_Ki: 2.036
pid_Kd: 82.742

[tmc2209 extruder]
#uart_pin: configuration in sht36_v3.cfg
interpolate: True
run_current: 0.5

[autotune_tmc extruder]
motor: flsun-v400-36

[heater_bed]
heater_pin: BED_EN_PIN
sensor_pin: BED_TEMP_PIN
sensor_type: EPCOS 100K B57560G104F # Ender-3 bed
min_temp: 10
max_temp: 115
control: pid
# Tuned for 235x235 Ender-3 bed at 60C target
pid_Kp: 68.864
pid_Ki: 0.952
pid_Kd: 1244.714

[fan]
#pin: configuration in sht36_v3.cfg
cycle_time: 0.100

[heater_fan hotend_cooling_fan]
#pin: configuration in sht36_v3.cfg
heater: extruder
heater_temp: 45.0

#[heater_fan nevermore_fan]
#pin: HE2_EN_PIN
#heater: heater_bed
#heater_temp: 70

#[controller_fan driver_cooling_fan]
#pin: FAN2_EN_PIN
#kick_start_time: 0.5
#fan_speed: 0.6
#idle_timeout: 15
#stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2, extruder

#[fan_generic electronics_bay_fan]
#pin: FAN3_EN_PIN

#[delayed_gcode turnOnFan]
#initial_duration: 1
#gcode:
#    SET_FAN_SPEED FAN=electronics_bay_fan SPEED=0.3

#[temperature_sensor chamber]
#sensor_pin: H1_TEMP_PIN
#sensor_type: Generic 3950
#min_temp: 0
#max_temp: 80

[probe_eddy_current fly_eddy_probe]
sensor_type: ldc1612
descend_z: 2.5
#i2c_address: configuration in sht36_v3.cfg
#i2c_mcu: configuration in sht36_v3.cfg
#i2c_bus: configuration in sht36_v3.cfg
#i2c_speed: configuration in sht36_v3.cfg
x_offset: 0
y_offset: 21.0
tap_z_offset: 0.3 # Hack to make eddy probe tap measurements align with reality

[gcode_macro PROBE_EDDY_CURRENT_CALIBRATE_AUTO]
gcode:
    BED_MESH_CLEAR
    G28 X Y
    M190 S60
    M109 S150
    G90 # Abs positioning
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000
    {% if 'z' not in printer.toolhead.homed_axes %}
        SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum.z - 1} # Allows the user to work it down until it touches.
    {% endif %}
    PROBE_EDDY_CURRENT_CALIBRATE {rawparams}
    M190 S0
    M109 S0

#[bltouch]
#sensor_pin: configuration in sht36_v3.cfg
#control_pin: configuration in sht36_v3.cfg
#pin_move_time: 0.2
#x_offset: -35.5
#y_offset: 12.5
#z_offset: 3.15
#speed: 2
#lift_speed: 10
#pin_up_reports_not_triggered: False
#pin_up_touch_mode_reports_triggered: False
#probe_with_touch_mode: True

[safe_z_home]
home_xy_position: 85, 69    # Place probe at the center of your print bed
speed: 300
z_hop: 5                  # Lift 5mm after homing Z
z_hop_speed: 10
move_to_previous: False

[z_tilt]
z_positions:
   # front leadscrews Y position: 2
   # rear leadscrew X position: 85
   # measurement between front leadscrews: 245
   # measurement between fron and rear leadscrews: 238
   -37.5, 2
   85, 240
   207.5, 2
points:
   5, 5
   85, 154
   165, 5
speed: 300
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.02

[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    BED_MESH_CLEAR
    {% if not printer.z_tilt.applied %}
    _Z_TILT_ADJUST horizontal_move_z=15 retry_tolerance=1
    {% endif %}
    _Z_TILT_ADJUST
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT

[bed_mesh]
speed: 50
horizontal_move_z: 2.5
mesh_min: 30, 30
mesh_max: 140, 150
zero_reference_position: 85, 69
probe_count: 7, 7
mesh_pps: 2, 2
adaptive_margin: 5
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: bicubic

[gcode_arcs]
resolution: 0.5

[gcode_macro G29]
description: Loads previously stored levelling mesh
gcode:
    BED_MESH_PROFILE LOAD=default

[gcode_macro G32]
description: Perform full home including Z tilt calibration
gcode:
    G28
    Z_TILT_ADJUST
    G28 Z

# The following 3 macros from: https://klipper.discourse.group/t/eddy-compensate-bed-mesh-with-tap/26142
[gcode_macro _RELOAD_Z_OFFSET_FROM_PROBE]
gcode:
    {% set Z = printer.toolhead.position.z %}
    M118 Z adjust {Z} -> {Z - printer.probe.last_probe_position.z}
    SET_KINEMATIC_POSITION Z={Z - printer.probe.last_probe_position.z}

[gcode_macro SET_Z_FROM_PROBE]
gcode:
    {% set METHOD = params.METHOD | default("automatic") %}
    {% set SAMPLES = params.SAMPLES | default(3) %}
    {% set PROBE_SPEED = params.PROBE_SPEED | default(4) %}
    {% set LIFT_SPEED = params.LIFT_SPEED | default(5) %}
    {% set SAMPLE_RETRACT_DIST = params.SAMPLE_RETRACT_DIST | default(2) %}
    PROBE METHOD={METHOD} SAMPLES={SAMPLES} PROBE_SPEED={PROBE_SPEED} LIFT_SPEED={LIFT_SPEED} SAMPLE_RETRACT_DIST={SAMPLE_RETRACT_DIST}
    _RELOAD_Z_OFFSET_FROM_PROBE
    G0 Z5

[gcode_macro BED_MESH_ADJ_FROM_TAP]
gcode:
    {% set is_absolute = printer.gcode_move.absolute_coordinates %}
    {% set zero_coords = printer.configfile.settings.bed_mesh.zero_reference_position %}
    M118 Probe at {zero_coords[0]}, {zero_coords[1]}
    G90
    G0 Z5 F300 # Z-Hop
    G0 X{zero_coords[0]} Y{zero_coords[1]} F3000
    SET_Z_FROM_PROBE METHOD=tap
    G0 Z5 F300 # Z-Hop
    {% if not is_absolute %}
        G91
    {% endif %}

[gcode_macro START_PRINT]
variable_probe_temp: 150
variable_heating_pos_x: 0
variable_heating_pos_y: 0
variable_heating_pos_z: 1.2
variable_purge_pos_x1: 35
variable_purge_pos_x2: 135
variable_purge_pos_y: 0
variable_purgepos_z: 0.6
variable_purge_extrude: 25
gcode:
    {% set PHASE = params.PHASE|default("all")|string %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(195)|float %}

    {% if PHASE == "preheat" or PHASE == "all" %}
		# Home the X and Y axis to ensure we don't start heating in a strange location
        G28 X Y
        # Heat bed to temperature and wait for it to complete
        M190 S{BED_TEMP}
        # Heat the nozzle to probe temperature and wait for it to complete
        M109 S{probe_temp}
    {% endif %}

    {% if PHASE == "bedmesh" or PHASE == "all" %}
        # Zero out the G-Code Z offset, in case it has been changed
        SET_GCODE_OFFSET Z=0.0
        # Fully home the printer, incluing Z tilt
        G32
        # Use an eddy tap to fine tune the nozzle position (experimental)
        # BED_MESH_ADJ_FROM_TAP - broken don't use it just messes up prints
        # Perform adaptive bed mesh calibration
        BED_MESH_CALIBRATE METHOD=rapid_scan ADAPTIVE=1
    {% endif %}

    {% if PHASE == "heat" or PHASE == "all" %}
        # Use absolute coordinates
        G90
        # Move the nozzle near the bed to prevent oozing
        G1 X{heating_pos_x} Y{heating_pos_y} Z{heating_pos_z} F30000
        # Heat the nozzle to printing temperature and wait for it to complete
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    {% if PHASE == "purge" or PHASE == "all" %}
        # Use absolute coordinates
        G90
        # Reset Extruder
        G92 E0
        # Nozzle purge line
        G1 X{purge_pos_x1} Y{purge_pos_y} Z{purgepos_z} F30000
        G1 X{purge_pos_x2} Y{purge_pos_y} Z{purgepos_z} F1500 E{purge_extrude}
        # Relative positioning
        G91
        # Retract 0.7mm to stop ooze
        G1 E-0.7 F2700
        # Z-hop
        G1 Z2 F300
        # Use absolute coordinates
        G90
        # Reset Extruder
        G92 E0
    {% endif %}

[gcode_macro END_PRINT]
variable_custom_finish_dz: 20
gcode:
    {% set custom_finish_x  = printer.toolhead.axis_maximum.x|default(170.0) %}
    {% set custom_finish_y  = printer.toolhead.axis_maximum.y|default(180.0) %}

    # Wipe nozzle while retracting
    G91
    G1 X-1 Y-1 E-2 F300
    # Raise nozzle
    G1 Z{custom_finish_dz} F3000
    G90
    # Present finished print
    G1 X{custom_finish_x} Y{custom_finish_y}
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Disable steppers, except Z
    M84 X Y E

[pause_resume]

[filament_switch_sensor runout]
pause_on_runout: True
runout_gcode:
    UNLOAD_FILAMENT
    M117 Load Filemant
insert_gcode:
    M117 Loading Filament
    LOAD_FILAMENT
event_delay: 0.5
pause_delay: 0.5
#switch_pin: configuration in sht36_v3.cfg

[gcode_macro UNLOAD_FILAMENT]
description: Unloads the filament for a filament change
variable_ram_length: 5
variable_ram_speed: 5
variable_retract_length: 50
variable_retract_speed: 45
variable_unload_speed: 30
gcode:
    {% set UNLOAD_LENGTH = params.UNLOAD_LENGTH|default(150)|float %}
    G91
    # Ram to form point on tip
    G1 E{ram_length} F{ram_speed * 60}
    G1 E-{retract_length} F{retract_speed * 60}
    # Unload filament from bowden tube
    G1 E-{UNLOAD_LENGTH - retract_length} F{unload_speed * 60}

[gcode_macro LOAD_FILAMENT]
description: Loads and purges filament when a new spool has been loaded
variable_load_speed: 30
variable_purge_speed: 5
gcode:
    {% set LOAD_LENGTH = params.LOAD_LENGTH|default(50)|float %}
    {% set PURGE_LENGTH = params.PURGE_LENGTH|default(100)|float %}
    G91
    # Load filament through bowden tube quickly
    G1 E{LOAD_LENGTH} F{load_speed * 60}
    # Purge nozzle before resuming
    G1 E{PURGE_LENGTH} F{purge_speed * 60}

[gcode_macro M600]
gcode:
    PAUSE
    M117 Swap Filemant

#[neopixel sb_leds]
#pin: NEOPIXEL_PIN
#   The pin connected to the neopixel. This parameter must be provided.
#chain_count: 10
#   The number of Neopixel chips that are "daisy chained" to the
#   provided pin. The default is 1 (which indicates only a single
#   Neopixel is connected to the pin).
#color_order: BGR, BGR, BGR, BGR, BGR, BGR, BGR, BGR, WBGR, WBGR
#   Set the pixel order required by the LED hardware. Options are GRB,
#   RGB, GRBW, or RGBW. The default is GRB.
#initial_RED: 0.0
#initial_GREEN: 0.0
#initial_BLUE: 1.0
#initial_WHITE: 1.0
#   Sets the initial LED color of the Neopixel. Each value should be
#   between 0.0 and 1.0. The WHITE option is only available on RGBW
#   LEDs. The default for each color is 0.
#

##	Example to set RGB values on boot up for each Neopixel. 
##	Index 1 = display, Index 2 and 3 = Knob
#[delayed_gcode setdisplayneopixel]
#initial_duration: 1
#gcode:
#  SET_LED LED=mini12864 RED=0 GREEN=1 BLUE=1 INDEX=1 TRANSMIT=0
#  SET_LED LED=mini12864 RED=0 GREEN=1 BLUE=1 INDEX=2 TRANSMIT=0
